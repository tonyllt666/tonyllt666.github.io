<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hover animations and sound effects ,nine individual icons</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="icons-grid">
            <img src="images/icon1.png" class="icon" data-index="1" alt="icon1">
            <img src="images/icon2.png" class="icon" data-index="2" alt="icon2">
            <img src="images/icon3.png" class="icon" data-index="3" alt="icon3">
            <img src="images/icon4.png" class="icon" data-index="4" alt="icon4">
            <img src="images/icon5.png" class="icon" data-index="5" alt="icon5">
            <img src="images/icon6.png" class="icon" data-index="6" alt="icon6">
            <img src="images/icon7.png" class="icon" data-index="7" alt="icon7">
            <img src="images/icon8.png" class="icon" data-index="8" alt="icon8">
            <img src="images/icon9.png" class="icon" data-index="9" alt="icon9">
        </div>
    </div>

    <div style="display: none;">
        <audio id="sound1" preload="auto"><source src="sounds/sound1.mp3" type="audio/mpeg"></audio>
        <audio id="sound2" preload="auto"><source src="sounds/sound2.mp3" type="audio/mpeg"></audio>
        <audio id="sound3" preload="auto"><source src="sounds/sound3.mp3" type="audio/mpeg"></audio>
        <audio id="sound4" preload="auto"><source src="sounds/sound4.mp3" type="audio/mpeg"></audio>
        <audio id="sound5" preload="auto"><source src="sounds/sound5.mp3" type="audio/mpeg"></audio>
        <audio id="sound6" preload="auto"><source src="sounds/sound6.mp3" type="audio/mpeg"></audio>
        <audio id="sound7" preload="auto"><source src="sounds/sound7.mp3" type="audio/mpeg"></audio>
        <audio id="sound8" preload="auto"><source src="sounds/sound8.mp3" type="audio/mpeg"></audio>
        <audio id="sound9" preload="auto"><source src="sounds/sound9.mp3" type="audio/mpeg"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
